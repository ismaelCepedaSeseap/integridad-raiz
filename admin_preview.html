<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Previa - Integridad desde la Raíz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/pages/shared.css">
    <link rel="stylesheet" href="assets/css/pages/admin_preview.css">
    <link rel="stylesheet" href="assets/css/pages/index.css">
    <link rel="stylesheet" href="assets/css/pages/detalle_evento.css">
    <script src="assets/js/data/events-data.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">
    
    <div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-50">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600 mx-auto mb-4"></div>
            <p class="text-slate-500">Esperando datos del editor...</p>
        </div>
    </div>

    <div id="preview-container" class="w-full min-h-screen">
        <!-- El contenido se renderizará aquí -->
    </div>

    <div id="lightbox" onclick="closeLightbox()" class="fixed inset-0 bg-black/90 z-[60] hidden items-center justify-center">
        <button class="absolute top-10 right-10 text-white hover:text-green-400 transition"><i data-lucide="x-circle" class="w-12 h-12"></i></button>
        <img id="lightbox-img" src="" class="max-w-[90%] max-h-[85vh] rounded-xl border-4 border-white/20 shadow-2xl" alt="Vista Ampliada">
    </div>

    <script>
        // Variables globales para el visor
        let visorIndex = 0;
        let currentVisorEvent = null;
        let visorInterval;

        // Mapa de iconos SVG
        const socialIcons = {
            facebook: `<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>`,
            twitter_x: `<path d="M4 4l11.733 16h4.267l-11.733-16zM4 20l6.768-6.768m2.464-2.464l6.768-6.768"/>`,
            instagram: `<rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>`,
            tiktok: `<path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>`,
            youtube: `<path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.11 1 12 1 12s0 3.89.46 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.89 23 12 23 12s0-3.89-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/>`,
            spotify: `<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5-1 4-1 4 1 4 1"/><path d="M7 11.5s2-1.5 5-1.5 5 1.5 5 1.5"/><path d="M6 9s2.5-2 6-2 6 2 6 2"/>`,
            default: `<circle cx="12" cy="12" r="10"/>`
        };

        function isVideoSource(src) {
            if (!src || typeof src !== 'string') return false;
            const clean = src.split('?')[0].split('#')[0].toLowerCase();
            return clean.endsWith('.mp4') || clean.endsWith('.webm') || clean.endsWith('.ogg');
        }

        function getVideoType(src) {
            const clean = src.split('?')[0].split('#')[0].toLowerCase();
            if (clean.endsWith('.webm')) return 'video/webm';
            if (clean.endsWith('.ogg')) return 'video/ogg';
            return 'video/mp4';
        }

        function hasText(value) {
            return typeof value === 'string' && value.trim().length > 0;
        }

        function cleanStringArray(value) {
            return Array.isArray(value)
                ? value.filter(item => typeof item === 'string' && item.trim().length > 0)
                : [];
        }

        window.updatePreview = function(tab, data) {
            const container = document.getElementById('preview-container');
            const loading = document.getElementById('loading');
            
            if (loading) loading.style.display = 'none';
            
            let html = '';

            if (tab === 'slider') {
                html = '<div class="w-full bg-slate-50">';
                data.forEach((slide, index) => {
                    html += `
                        <div class="relative w-full min-h-[600px] flex items-center justify-center border-b border-slate-200 overflow-hidden group">
                            <div class="absolute top-4 left-4 bg-black/50 text-white text-xs px-2 py-1 rounded z-50">Slide #${index + 1}</div>
                            ${slide.type === 'complex' 
                                ? `<div class="absolute inset-0 bg-cover bg-center" style="background: ${slide.background}"></div>
                                   <div class="relative z-10 text-center p-8 max-w-4xl mx-auto">
                                        <span class="inline-block px-4 py-1 rounded-full bg-white/50 backdrop-blur-sm text-green-800 font-bold text-sm mb-6 shadow-sm border border-white/40 animate-fade-in">${slide.badge}</span>
                                        <h1 class="text-5xl md:text-7xl font-bold text-slate-800 mb-6 leading-tight animate-fade-in">${slide.title}</h1>
                                        <p class="text-xl md:text-2xl text-slate-600 mb-8 animate-fade-in">${slide.description}</p>
                                        <div class="flex gap-4 justify-center animate-fade-in">
                                            <button class="px-8 py-4 bg-green-600 text-white rounded-full font-bold shadow-lg shadow-green-600/30 text-lg hover:scale-105 transition-transform">Botón Principal</button>
                                        </div>
                                   </div>
                                   <img src="${slide.image}" class="absolute bottom-0 right-0 w-1/3 object-contain opacity-80" style="max-height: 80%;">
                                  `
                                : (() => {
                                    const bgSrc = slide.backgroundVideo || slide.backgroundImage || '';
                                    if (isVideoSource(bgSrc)) {
                                        return `
                                            <div class="absolute inset-0 bg-black">
                                                <video class="absolute inset-0 w-full h-full object-cover" autoplay muted loop playsinline preload="metadata">
                                                    <source src="${bgSrc}" type="${getVideoType(bgSrc)}">
                                                </video>
                                                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                                                <div class="absolute bottom-20 left-12 text-white max-w-2xl">
                                                    <h2 class="text-5xl font-bold mb-4 drop-shadow-lg">Slide Simple</h2>
                                                    <p class="text-xl opacity-90 drop-shadow-md">Este slide muestra un video de fondo.</p>
                                                </div>
                                            </div>
                                        `;
                                    }
                                    return `
                                        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('${bgSrc}')">
                                            <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                                            <div class="absolute bottom-20 left-12 text-white max-w-2xl">
                                                <h2 class="text-5xl font-bold mb-4 drop-shadow-lg">Slide Simple</h2>
                                                <p class="text-xl opacity-90 drop-shadow-md">Este slide muestra solo la imagen de fondo.</p>
                                            </div>
                                       </div>
                                    `;
                                })()
                            }
                        </div>
                    `;
                });
                html += '</div>';
            } else if (tab === 'states') {
                 html = `
                    <div class="py-24 px-6 bg-slate-50 text-center min-h-screen flex flex-col items-center justify-center">
                        <div class="mb-12">
                            <h2 class="text-3xl font-bold text-slate-800 mb-4">Nuestros Estados</h2>
                            <p class="text-slate-500">Vista previa de las tarjetas de estados y sus redes sociales</p>
                        </div>
                        <div class="flex flex-wrap justify-center gap-8">
                            ${data.map(state => `
                                <div class="group flex flex-col items-center gap-3 flex-shrink-0 w-[240px]">
                                    <div class="w-full h-32 bg-white rounded-xl flex items-center justify-center border border-slate-200 shadow-sm p-8 group-hover:border-green-600 group-hover:shadow-md transition-all duration-300 transform group-hover:-translate-y-1">
                                        <img src="${state.logo}" class="w-full h-full object-contain grayscale group-hover:grayscale-0 transition-all duration-300">
                                    </div>
                                    <div class="flex flex-col items-center gap-3">
                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] group-hover:text-green-800 transition-colors">${state.name}</span>
                                        <div class="flex flex-wrap justify-center gap-4 transition-all duration-300">
                                            ${state.socials.map(social => `
                                                <div class="text-slate-400 hover:text-green-800 hover:scale-110 transition-all cursor-pointer" title="${social.name}">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                                        ${socialIcons[social.icon] || socialIcons.default}
                                                    </svg>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                 `;
            } else if (tab === 'cine') {
                const count = data.length;
                let gridClass = 'grid-cols-1 md:grid-cols-3';
                if (count === 1) gridClass = 'grid-cols-1 place-items-center';
                else if (count === 2) gridClass = 'grid-cols-1 md:grid-cols-2';
                else if (count === 4) gridClass = 'grid-cols-1 md:grid-cols-2 lg:grid-cols-4';
                else if (count >= 5) gridClass = 'grid-cols-1 md:grid-cols-3 lg:grid-cols-4';

                html = `
                    <div class="py-24 px-6 bg-slate-50 min-h-screen">
                        <div class="max-w-7xl mx-auto px-6">
                            <div class="text-center mb-16">
                                <div class="inline-block p-3 bg-yellow-100 rounded-2xl text-yellow-600 mb-4"><i data-lucide="film" class="w-8 h-8"></i></div>
                                <h2 class="text-4xl md:text-5xl font-black text-slate-900 mb-4 italic uppercase">Cine de la Integridad</h2>
                                <p class="text-slate-500 text-lg max-w-2xl mx-auto">Nuestros guardianes tienen un mensaje especial para ti. ¡Dale play!</p>
                            </div>
                            <div class="grid ${gridClass} gap-12 lg:gap-24">
                                ${data.map(item => `
                                    <div class="text-center">
                                        <div class="video-mobile-frame border-slate-700" style="height:80%;">
                                            <video controls poster="${item.posterSrc}">
                                                <source src="${item.videoSrc}" type="video/mp4">
                                                Tu navegador no soporta el elemento de video.
                                            </video>
                                        </div>
                                        <div class="cursor-pointer video-label border-b-4 border-slate-400">
                                            <h3 class="text-2xl font-black ${item.titleColorClass || 'text-slate-900'} italic">${item.name}</h3>
                                            <p class="text-green-600 font-bold text-xs uppercase tracking-widest mt-1">${item.slogan}</p>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (tab === 'cine_youtube') {
                const count = data.length;
                let gridClass = 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3';
                
                html = `
                    <div class="py-24 px-6 bg-slate-50 min-h-screen">
                        <div class="max-w-7xl mx-auto px-6">
                            <div class="text-center mb-16">
                                <h2 class="text-5xl font-black text-slate-900 italic">Cine de la Integridad</h2>
                                <p class="text-slate-500 text-lg mt-2">Explora contenidos educativos por estado.</p>
                            </div>
                            
                            <div class="grid ${gridClass} gap-8">
                                ${data.map(video => `
                                    <div class="video-container group bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-300">
                                        <div class="relative aspect-video overflow-hidden">
                                            <span class="absolute top-4 left-4 z-10 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${video.badgeClass || 'bg-slate-800'} text-white">${video.stateLabel || 'Video'}</span>
                                            <img src="https://img.youtube.com/vi/${video.id}/hqdefault.jpg" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700" alt="Miniatura">
                                            <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                                <div class="w-16 h-16 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/50">
                                                    <i data-lucide="play" class="w-8 h-8 text-white fill-current"></i>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="p-6 flex flex-col h-full">
                                            <h3 class="text-xl font-black text-slate-900 leading-tight mb-2 line-clamp-2">${video.title}</h3>
                                            <p class="text-slate-500 text-sm italic mb-4 line-clamp-3">${video.description}</p>
                                            ${video.hashtag ? `
                                                <div class="mt-auto inline-flex items-center px-3 py-1 rounded-full bg-slate-100 text-[10px] font-bold text-slate-500 uppercase tracking-wider self-start">
                                                    ${video.hashtag}
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            } else if (tab === 'event' || tab === 'events') {
                let visibleEvent;
                if (Array.isArray(data)) {
                    visibleEvent = data.find(e => e.visible) || data[0];
                } else {
                    visibleEvent = data;
                }
                
                if (!visibleEvent) {
                    html = '<div class="min-h-screen flex items-center justify-center text-slate-400">No hay eventos visibles</div>';
                } else {
                    currentVisorEvent = visibleEvent;
                    const eventBanners = cleanStringArray(visibleEvent.banners);
                    const eventPillars = cleanStringArray(visibleEvent.pillars);
                    const galleryItems = cleanStringArray(visibleEvent.gallery);
                    const eventTitle = hasText(visibleEvent.title) ? visibleEvent.title : '';
                    const eventDate = hasText(visibleEvent.date) ? visibleEvent.date : '';
                    const eventLocation = hasText(visibleEvent.location) ? visibleEvent.location : '';
                    const eventSlogan = hasText(visibleEvent.slogan) ? visibleEvent.slogan : '';
                    const eventDescription = hasText(visibleEvent.description) ? visibleEvent.description : '';
                    const eventImpact = hasText(visibleEvent.impact) ? visibleEvent.impact : '';
                    const eventPillarsCount = hasText(visibleEvent.pillars_count) ? visibleEvent.pillars_count : '';
                    const eventState = hasText(visibleEvent.state) ? visibleEvent.state : '';
                    const eventDecorations = visibleEvent.decorations || {};
                    const decorationTopLeft = hasText(eventDecorations.topLeft) ? eventDecorations.topLeft : '';
                    const decorationBottomRight = hasText(eventDecorations.bottomRight) ? eventDecorations.bottomRight : '';
                    const heroImage = hasText(visibleEvent.imageUrl)
                        ? visibleEvent.imageUrl
                        : (hasText(visibleEvent.mainImage) ? visibleEvent.mainImage : (galleryItems[0] || ''));

                    const indexMetaHtml = `
                        ${eventLocation ? `<div class="bg-slate-50 px-4 py-2 rounded-xl text-slate-500 font-bold text-xs flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> ${eventLocation}</div>` : ''}
                        ${eventDate ? `<div class="bg-slate-50 px-4 py-2 rounded-xl text-slate-500 font-bold text-xs flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> ${eventDate}</div>` : ''}
                    `;

                    // --- INDEX VERSION (Último Evento) ---
                    const indexHtml = `
                        <div class="event-main-card">
                            <!-- Header del Evento -->
                            <div class="p-6 sm:p-10 lg:p-16 flex flex-col lg:flex-row gap-8 lg:gap-12 items-center bg-gradient-to-br from-green-50 to-white">
                                <div class="lg:w-1/2">
                                    ${hasText(visibleEvent.badge) ? `<div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white border border-green-200 text-green-700 text-xs font-black mb-6 uppercase tracking-widest shadow-sm">
                                        <i data-lucide="sparkles" class="w-4 h-4 fill-green-500 text-green-500"></i> ${visibleEvent.badge}
                                    </div>` : ''}
                                    ${eventTitle ? `<h2 class="text-4xl md:text-6xl font-black text-slate-900 mb-6 leading-tight italic">${eventTitle}</h2>` : ''}
                                    ${eventDescription ? `<p class="text-lg text-slate-600 mb-8 leading-relaxed italic">${eventDescription}</p>` : ''}
                                    ${indexMetaHtml.trim() ? `<div class="flex flex-wrap gap-4 mb-8">${indexMetaHtml}</div>` : ''}
                                    ${visibleEvent.url && visibleEvent.url !== '#' ? `
                                        <a href="#" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-green-700 transition-all flex items-center gap-3">
                                            <i data-lucide="plus-circle"></i> Ver Detalles del Evento
                                        </a>
                                    ` : ''}
                                </div>

                                <div class="lg:w-1/2 relative">
                                    ${decorationTopLeft ? `
                                        <div class="absolute -left-6 -top-6 w-24 z-20 banderin-float"><img src="${decorationTopLeft}" class="rounded-xl shadow-lg" onerror="this.src='assets/images/logo.png'"></div>
                                    ` : ''}
                                    ${hasText(visibleEvent.mainImage) ? `
                                    <div class="rounded-[3rem] overflow-hidden shadow-2xl border-4 sm:border-8 border-white aspect-video relative z-10 cursor-pointer" onclick="openLightbox('${visibleEvent.mainImage}')">
                                        <img src="${visibleEvent.mainImage}" class="w-full h-full object-cover">
                                    </div>
                                    ` : ''}
                                    ${decorationBottomRight ? `
                                        <div class="absolute -right-6 -bottom-6 w-24 z-20 banderin-float" style="animation-delay: -1.5s;"><img src="${decorationBottomRight}" class="rounded-xl shadow-lg" onerror="this.src='assets/images/logo.png'"></div>
                                    ` : ''}
                                </div>
                            </div>

                            <!-- Galería con Slider (Opcional) -->
                            ${galleryItems.length > 0 ? `
                                <div class="p-10 border-t border-slate-100 bg-white">
                                    <div class="flex justify-between items-center mb-8">
                                        <h3 class="text-xl font-black text-slate-900 uppercase italic">Galería de Momentos</h3>
                                        <div class="flex gap-2">
                                            <button onclick="scrollGallery('left')" class="p-2 rounded-full bg-slate-100 hover:bg-green-600 hover:text-white transition"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                                            <button onclick="scrollGallery('right')" class="p-2 rounded-full bg-slate-100 hover:bg-green-600 hover:text-white transition"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                                        </div>
                                    </div>

                                    <div id="gallery-slider" class="flex gap-6 overflow-x-auto hide-scrollbar scroll-smooth mb-4 pb-4">
                                        ${galleryItems.map(img => `
                                            <div class="gallery-item" onclick="openLightbox('${img}')"><img src="${img}" class="w-full h-full object-cover"></div>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `;

                    let pillarsHtml = '';
                    if (eventBanners.length > 0) {
                        pillarsHtml = eventBanners.map(banner => `
                            <div class="banner-roll-up h-[500px] w-auto flex-shrink-0 hover:scale-105 transition-transform duration-300">
                                <img src="${banner}" class="h-full w-auto rounded-3xl shadow-xl" onerror="this.onerror=null;this.src='assets/images/logo.png'">
                            </div>
                        `).join('');
                    } else if (eventPillars.length > 0) {
                        pillarsHtml = eventPillars.map((pillar) => `
                            <div class="banner-roll-up min-w-[180px] h-[240px] bg-gradient-to-br from-green-50 to-white rounded-2xl shadow-lg border-2 border-green-100 flex flex-col items-center justify-center p-4 text-center group hover:border-green-400 transition-all relative overflow-hidden flex-shrink-0">
                                <div class="absolute top-0 left-0 w-full h-2 bg-green-500"></div>
                                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4 text-green-600 group-hover:scale-110 transition-transform">
                                    <i data-lucide="star" class="w-8 h-8"></i>
                                </div>
                                <h4 class="text-xl font-bold text-slate-800 font-kids">${pillar}</h4>
                                <div class="absolute bottom-0 right-0 opacity-10">
                                    <i data-lucide="shield" class="w-24 h-24 text-green-800"></i>
                                </div>
                            </div>
                        `).join('');
                    }

                    const chronicle = visibleEvent.chronicle || {};
                    const chronicleContentList = cleanStringArray(chronicle.content);
                    const chronicleValues = cleanStringArray(chronicle.values);
                    const plainChronicleContent = hasText(chronicle.content) ? chronicle.content.trim() : '';
                    const hasChronicle = Boolean(
                        (chronicle.label && chronicle.label.trim()) ||
                        (chronicle.title && chronicle.title.trim()) ||
                        (chronicle.date && chronicle.date.trim()) ||
                        (chronicle.location && chronicle.location.trim()) ||
                        (chronicle.quote && chronicle.quote.trim()) ||
                        (chronicle.quoteAuthor && chronicle.quoteAuthor.trim()) ||
                        plainChronicleContent ||
                        chronicleContentList.length > 0 ||
                        chronicleValues.length > 0 ||
                        (chronicle.footer && chronicle.footer.trim())
                    );

                    let chronicleHtml = '';
                    if (hasChronicle) {
                        const contentHtml = chronicleContentList.length > 0
                            ? chronicleContentList.map(p => `<p class="text-slate-600 leading-relaxed mb-4 break-words whitespace-pre-wrap">${p}</p>`).join('')
                            : (plainChronicleContent ? `<p class="text-slate-600 leading-relaxed mb-4 break-words whitespace-pre-wrap">${plainChronicleContent}</p>` : '');

                        const valuesHtml = chronicleValues.length > 0
                            ? `<div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 my-6">
                                <h4 class="font-bold text-slate-800 mb-2 flex items-center gap-2"><i data-lucide="award" class="text-green-600 w-5 h-5"></i> Valores Abanderados</h4>
                                <p class="text-slate-600 text-sm">${chronicleValues.join(', ')}.</p>
                            </div>`
                            : '';

                        const quoteHtml = hasText(chronicle.quote)
                            ? `<p class="text-xl text-slate-700 leading-relaxed font-serif italic font-medium">
                                ${chronicle.quote} <br>
                                ${hasText(chronicle.quoteAuthor) ? `<span class="text-sm not-italic text-slate-400 font-sans font-bold uppercase mt-2 block">${chronicle.quoteAuthor}</span>` : ''}
                            </p>`
                            : '';

                        const footerHtml = hasText(chronicle.footer)
                            ? `<p class="text-slate-500 text-sm italic border-t border-slate-100 pt-4 mt-4">${chronicle.footer}</p>`
                            : '';

                        chronicleHtml = `
                            <div class="mb-24 border-t border-b border-slate-100 py-16">
                                <div class="flex flex-col md:flex-row gap-12 items-start">
                                    <div class="w-full md:w-1/3 text-center md:text-right md:sticky md:top-24">
                                        <span class="inline-block px-4 py-2 rounded-full bg-slate-100 text-slate-500 font-bold text-xs uppercase tracking-widest mb-4">${chronicle.label || 'Crónica del Evento'}</span>
                                        <h3 class="text-3xl font-black text-slate-900 leading-tight mb-4 font-kids italic">${chronicle.title || ''}</h3>
                                        <p class="text-green-600 font-bold text-sm uppercase tracking-widest mb-2">${chronicle.date || ''}</p>
                                        <p class="text-slate-400 text-xs font-semibold">${chronicle.location || ''}</p>
                                    </div>
                                    <div class="w-full md:w-2/3 border-l-0 md:border-l-4 border-green-500 pl-0 md:pl-12 space-y-6 max-h-[600px] overflow-y-auto overflow-x-hidden pr-4 break-words" id="chronicle-scroll">
                                        ${quoteHtml}
                                        ${contentHtml}
                                        ${valuesHtml}
                                        ${footerHtml}
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    const validResults = Array.isArray(visibleEvent.results)
                        ? visibleEvent.results.filter(item => item && (hasText(item.value) || hasText(item.label)))
                        : [];
                    let resultsHtml = '';
                    if (validResults.length > 0) {
                        const resultsItems = validResults.map(item => `
                            <div class="bg-white/5 p-10 rounded-[3rem] border border-white/10 backdrop-blur-sm">
                                ${hasText(item.value) ? `<p class="text-6xl font-black mb-4">${item.value}</p>` : ''}
                                ${hasText(item.label) ? `<p class="text-sm font-bold uppercase tracking-widest text-green-300">${item.label}</p>` : ''}
                            </div>
                        `).join('');

                        resultsHtml = `
                            <div class="bg-green-900 py-24 text-center text-white">
                                <div class="max-w-7xl mx-auto px-6">
                                    <h3 class="text-3xl font-kids text-yellow-400 mb-12 tracking-widest uppercase italic">Cosechando Resultados Reales</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
                                        ${resultsItems}
                                    </div>
                                </div>
                            </div>
                        `;
                    }

                    const galleryHtml = galleryItems.length > 0 ? `
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 mb-24 sm:mb-32">
                            <div class="text-center mb-16">
                                <h3 class="text-4xl font-kids text-slate-900 tracking-tighter uppercase mb-4 italic">Galería</h3>
                                <p class="text-slate-400 font-bold uppercase tracking-widest text-sm">Explora los momentos más memorables</p>
                            </div>

                            <div class="visor-container group animate-fade-in">
                                <div id="visor-slides">
                                    ${galleryItems.map((img, index) => `
                                        <div class="visor-slide ${index === 0 ? 'active' : ''}">
                                            <img src="${img}" />
                                        </div>
                                    `).join('')}
                                </div>

                                <div class="visor-overlay"></div>

                                <button onclick="manualMoveVisor(-1)" class="absolute left-3 sm:left-8 top-1/2 -translate-y-1/2 z-10 w-12 h-12 sm:w-16 sm:h-16 bg-white/10 backdrop-blur-md text-white rounded-full flex items-center justify-center hover:bg-white hover:text-slate-900 transition-all shadow-2xl opacity-0 group-hover:opacity-100 border border-white/20">
                                    <i data-lucide="chevron-left" class="w-6 h-6 sm:w-8 sm:h-8"></i>
                                </button>
                                <button onclick="manualMoveVisor(1)" class="absolute right-3 sm:right-8 top-1/2 -translate-y-1/2 z-10 w-12 h-12 sm:w-16 sm:h-16 bg-white/10 backdrop-blur-md text-white rounded-full flex items-center justify-center hover:bg-white hover:text-slate-900 transition-all shadow-2xl opacity-0 group-hover:opacity-100 border border-white/20">
                                    <i data-lucide="chevron-right" class="w-6 h-6 sm:w-8 sm:h-8"></i>
                                </button>

                                <div class="absolute bottom-4 left-4 sm:bottom-10 sm:left-10 z-10 text-white animate-fade-in">
                                    <span id="slide-region" class="bg-green-500 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest mb-3 inline-block">Cargando...</span>
                                    <h2 id="slide-title" class="text-xl sm:text-3xl font-bold tracking-tight">Cargando galería</h2>
                                    <p id="slide-date" class="text-white/60 font-medium text-sm">Espere un momento</p>
                                </div>

                                <div class="absolute top-4 right-4 sm:top-10 sm:right-10 z-10 bg-black/40 backdrop-blur-lg px-4 sm:px-6 py-2 rounded-full text-white font-bold text-sm border border-white/10">
                                    <span id="visor-index">01</span> / <span id="visor-total">00</span>
                                </div>
                            </div>

                            <div class="relative">
                                <button onclick="scrollThumbs('left')" class="absolute left-0 top-1/2 -translate-y-1/2 z-10 bg-white/80 backdrop-blur shadow-lg p-2 rounded-full hover:bg-white transition-all text-slate-800 border border-slate-100 hidden md:flex">
                                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                                </button>
                                <div class="thumb-strip hide-scrollbar mt-8" id="thumb-strip">
                                    ${galleryItems.map((img, index) => `
                                        <div class="thumb-item ${index === 0 ? 'active' : ''}" onclick="jumpToVisorSlide(${index})"><img src="${img}" class="w-full h-full object-cover"></div>
                                    `).join('')}
                                </div>
                                <button onclick="scrollThumbs('right')" class="absolute right-0 top-1/2 -translate-y-1/2 z-10 bg-white/80 backdrop-blur shadow-lg p-2 rounded-full hover:bg-white transition-all text-slate-800 border border-slate-100 hidden md:flex">
                                    <i data-lucide="chevron-right" class="w-6 h-6"></i>
                                </button>
                            </div>
                        </div>
                    ` : '';

                    const badgesHtml = `
                        ${eventDate ? `
                            <div class="bg-green-50 text-green-700 px-4 sm:px-8 py-3 sm:py-4 rounded-2xl font-bold text-base sm:text-lg flex items-center gap-3 shadow-sm border border-green-100">
                                <i data-lucide="calendar" class="w-5 h-5 sm:w-6 sm:h-6"></i> ${eventDate}
                            </div>
                        ` : ''}
                        ${eventLocation ? `
                            <div class="bg-blue-50 text-blue-700 px-4 sm:px-8 py-3 sm:py-4 rounded-2xl font-bold text-base sm:text-lg flex items-center gap-3 shadow-sm border border-blue-100">
                                <i data-lucide="map-pin" class="w-5 h-5 sm:w-6 sm:h-6"></i> ${eventLocation}
                            </div>
                        ` : ''}
                    `;
                    const badgesSectionHtml = badgesHtml.trim()
                        ? `<div class="flex flex-wrap gap-4 mb-16 animate-fade-in">${badgesHtml}</div>`
                        : '';

                    const metricsHtml = `
                        ${eventImpact ? `
                            <div class="bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl shadow-lg border border-slate-50 flex items-center gap-4 flex-1 min-w-0">
                                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-green-100 rounded-full flex items-center justify-center text-green-600 flex-shrink-0">
                                    <i data-lucide="users"></i>
                                </div>
                                <div class="min-w-0"><p class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest">Impacto</p><p class="text-lg sm:text-xl font-bold break-words">${eventImpact}</p></div>
                            </div>
                        ` : ''}
                        ${eventPillarsCount ? `
                            <div class="bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl shadow-lg border border-slate-50 flex items-center gap-4 flex-1 min-w-0">
                                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 flex-shrink-0">
                                    <i data-lucide="shield-check"></i>
                                </div>
                                <div class="min-w-0"><p class="text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-widest">Valores</p><p class="text-lg sm:text-xl font-bold break-words">${eventPillarsCount}</p></div>
                            </div>
                        ` : ''}
                    `;

                    const introTextHtml = `
                        ${eventSlogan ? `<h3 class="text-3xl sm:text-4xl font-kids text-slate-800 italic">${eventSlogan}</h3>` : ''}
                        ${eventDescription ? `<p class="text-base sm:text-xl text-slate-600 leading-relaxed font-medium">${eventDescription}</p>` : ''}
                        ${metricsHtml.trim() ? `<div class="flex flex-col sm:flex-row gap-4 sm:gap-6 pt-2 sm:pt-4">${metricsHtml}</div>` : ''}
                    `;

                    const introImage = galleryItems[0] || heroImage;
                    const introImageHtml = introImage
                        ? `<div class="relative group max-w-xl lg:max-w-none mx-auto w-full">
                                ${decorationTopLeft ? `<div class="hidden sm:block absolute -left-4 sm:-left-10 -top-4 sm:-top-10 w-28 sm:w-40 banderin-float z-20"><img src="${decorationTopLeft}" class="rounded-3xl shadow-2xl" onerror="this.src='assets/images/logo.png'"></div>` : ''}
                                <div class="photo-frame-polaroid rounded-[2.5rem] sm:rounded-[3rem] overflow-hidden w-full aspect-[4/3] bg-slate-200 sm:rotate-2 group-hover:rotate-0 transition-transform duration-700">
                                    <img src="${introImage}" class="w-full h-full object-cover">
                                </div>
                                ${decorationBottomRight ? `<div class="hidden sm:block absolute -right-4 sm:-right-10 -bottom-4 sm:-bottom-10 w-28 sm:w-40 banderin-float z-20" style="animation-delay:-2s"><img src="${decorationBottomRight}" class="rounded-3xl shadow-2xl" onerror="this.src='assets/images/logo.png'"></div>` : ''}
                            </div>`
                        : '';

                    const introSectionHtml = (introTextHtml.trim() || introImageHtml)
                        ? `<div class="grid lg:grid-cols-2 gap-10 lg:gap-20 items-start mb-16 sm:mb-24">
                                ${introTextHtml.trim() ? `<div class="space-y-6 sm:space-y-8">${introTextHtml}</div>` : '<div></div>'}
                                ${introImageHtml || '<div></div>'}
                            </div>`
                        : '';

                    const pillarsSectionHtml = pillarsHtml
                        ? `<div class="mb-24">
                                <div class="flex items-center justify-between mb-10">
                                    <h3 class="text-3xl font-kids text-slate-900 italic tracking-tighter uppercase">Pilares Éticos</h3>
                                    <div class="flex gap-3">
                                        <button onclick="scrollBanners('left')" class="p-3 bg-slate-100 shadow-sm rounded-full hover:bg-green-600 hover:text-white transition-all"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>
                                        <button onclick="scrollBanners('right')" class="p-3 bg-slate-100 shadow-sm rounded-full hover:bg-green-600 hover:text-white transition-all"><i data-lucide="chevron-right" class="w-6 h-6"></i></button>
                                    </div>
                                </div>
                                <div id="banner-scroll" class="flex gap-8 overflow-x-auto hide-scrollbar py-6 px-2 scroll-smooth">
                                    ${pillarsHtml}
                                </div>
                            </div>`
                        : '';

                    const detailHtml = `
                        <!-- Hero Full Width -->
                        <div class="hero-full" style="background-color: #f1f5f9;">
                            ${heroImage
                                ? `<img src="${heroImage}" class="w-full h-full object-cover" />`
                                : '<div class="w-full h-full flex items-center justify-center text-slate-400 font-bold tracking-widest uppercase">Sin imagen de portada</div>'
                            }
                            <div class="absolute inset-0 bg-gradient-to-t from-white via-white/20 to-black/30"></div>
                            
                            <!-- Botón Regresar (Simulado) -->
                            <a href="#" class="absolute top-4 left-4 sm:top-8 sm:left-8 z-20 bg-black/20 hover:bg-black/40 text-white backdrop-blur-md px-4 sm:px-5 py-2 rounded-full transition-all shadow-lg font-bold flex items-center gap-2 group border border-white/10">
                                <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
                                <span>Eventos</span>
                            </a>

                            <div class="absolute bottom-0 left-0 w-full px-6 sm:px-12 md:px-24 pb-0 md:pb-4">
                                <div class="max-w-7xl mx-auto">
                                    ${eventTitle ? `<h2 class="text-5xl md:text-8xl font-bold text-slate-900 leading-tight tracking-tighter drop-shadow-sm animate-zoom-in">${eventTitle}</h2>` : ''}
                                </div>
                            </div>
                        </div>

                        <!-- Content Wrapper centered -->
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-10 sm:pt-12">
                            ${badgesSectionHtml}

                            ${introSectionHtml}

                            ${chronicleHtml}

                            ${pillarsSectionHtml}
                        </div>

                        <!-- Gallery Section -->
                        ${galleryHtml}

                        ${resultsHtml}
                    `;

                    html = `
                        <div class="space-y-12">
                            <div class="bg-slate-100 p-4 text-center text-slate-500 font-bold uppercase tracking-widest border-b">Vista en Inicio (Último Evento)</div>
                            <div class="bg-white">
                                ${indexHtml}
                            </div>
                            
                            <div class="bg-slate-100 p-4 text-center text-slate-500 font-bold uppercase tracking-widest border-y">Vista Detalle Completo</div>
                            <div class="bg-slate-50 relative">
                                ${detailHtml}
                            </div>
                        </div>
                    `;
                    
                    setTimeout(() => {
                         initVisor();
                         if(window.lucide) window.lucide.createIcons();
                    }, 100);
                }
            }

            container.innerHTML = html;
            
            // Re-run scripts in inserted HTML if any (innerHTML doesn't exec scripts, but we have none inline usually)
            if (window.lucide) {
                window.lucide.createIcons();
            }
        };

        // Helper functions
        window.scrollGallery = function(direction) {
            const slider = document.getElementById('gallery-slider');
            if (slider) {
                const scrollAmount = 300;
                slider.scrollBy({ left: direction === 'left' ? -scrollAmount : scrollAmount, behavior: 'smooth' });
            }
        };

        window.openLightbox = function(src) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            if (lightbox && lightboxImg) {
                lightboxImg.src = src;
                lightbox.style.display = 'flex';
                setTimeout(() => lightbox.classList.remove('hidden'), 0); 
            }
        };

        window.closeLightbox = function() {
            const lightbox = document.getElementById('lightbox');
            if (lightbox) {
                lightbox.style.display = 'none';
            }
        };

        window.scrollBanners = function(dir) {
            const container = document.getElementById('banner-scroll');
            if (container) {
                container.scrollLeft += (dir === 'left' ? -300 : 300); 
            }
        };

        window.scrollThumbs = function(dir) {
            const container = document.getElementById('thumb-strip');
            if (container) {
                container.scrollLeft += (dir === 'left' ? -300 : 300); 
            }
        };

        function initVisor() {
            const slides = document.querySelectorAll('.visor-slide');
            const totalEl = document.getElementById('visor-total');
            if (!slides.length) return;
            if (totalEl) totalEl.textContent = String(slides.length).padStart(2, '0');
            visorIndex = 0;
            updateVisor();
            startVisorAutoplay();
        }

        function startVisorAutoplay() {
            clearInterval(visorInterval);
            visorInterval = setInterval(() => {
                moveVisor(1);
            }, 5000); 
        }

        function resetVisorAutoplay() {
            clearInterval(visorInterval);
            startVisorAutoplay();
        }

        function updateVisor() {
            const slides = document.querySelectorAll('.visor-slide');
            const thumbs = document.querySelectorAll('#thumb-strip .thumb-item');
            const indexEl = document.getElementById('visor-index');
            const regionEl = document.getElementById('slide-region');
            const titleEl = document.getElementById('slide-title');
            const dateEl = document.getElementById('slide-date');
            
            if (!slides.length) return; // Thumbs might be hidden or empty

            slides.forEach((slide, idx) => slide.classList.toggle('active', idx === visorIndex));
            if (thumbs.length) {
                thumbs.forEach((thumb, idx) => thumb.classList.toggle('active', idx === visorIndex));
            }
            
            if (indexEl) indexEl.textContent = String(visorIndex + 1).padStart(2, '0');
            if (currentVisorEvent) {
                if (regionEl) regionEl.textContent = hasText(currentVisorEvent.state) ? currentVisorEvent.state : (hasText(currentVisorEvent.location) ? currentVisorEvent.location : '');
                if (titleEl) titleEl.innerHTML = hasText(currentVisorEvent.title) ? currentVisorEvent.title : '';
                if (dateEl) dateEl.textContent = hasText(currentVisorEvent.date) ? currentVisorEvent.date : '';
            }
        }

        function moveVisor(direction) {
            const slides = document.querySelectorAll('.visor-slide');
            if (!slides.length) return;
            visorIndex = (visorIndex + direction + slides.length) % slides.length;
            updateVisor();
        }

        window.manualMoveVisor = function(direction) {
            moveVisor(direction);
            resetVisorAutoplay();
        }

        window.jumpToVisorSlide = function(index) {
            const slides = document.querySelectorAll('.visor-slide');
            if (!slides.length) return;
            visorIndex = index;
            updateVisor();
            resetVisorAutoplay();
        }

        window.addEventListener('message', function(event) {
            const { tab, data } = event.data;
            if (tab && data) {
                updatePreview(tab, data);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const tab = params.get('tab');
            if (tab === 'events' && typeof EVENTS !== 'undefined') {
                updatePreview('events', EVENTS);
            }
        });
    </script>
</body>
</html>
